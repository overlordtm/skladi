name: Update Fund Data

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Extract all fund data
        run: uv run extractors/extractory.py

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code data/*.csv || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git commit -m "Update fund data [skip ci]"
          git push
